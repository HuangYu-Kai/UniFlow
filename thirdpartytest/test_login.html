#用python3 -m http.server 8000來開啟測試，然後開啟網頁http://localhost:8000/test_login.html

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三方登入測試</title>
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
        }

        .google-btn {
            background-color: #fff;
            color: #757575;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background-color: #f8f8f8;
        }

        .line-btn {
            background-color: #06C755;
            color: white;
        }

        .line-btn:hover {
            background-color: #05b34c;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
            word-break: break-all;
            font-size: 14px;
            display: none;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>登入測試</h2>

        <!-- Google 登入按鈕容器 -->
        <div id="g_id_onload" data-client_id="69997871966-9dl46qarug7dc2g06al84q6njdtf74fn.apps.googleusercontent.com"
            data-context="signin" data-ux_mode="popup" data-callback="handleGoogleCredentialResponse"
            data-auto_prompt="false">
        </div>

        <div style="width: 100%; margin-bottom: 15px;">
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="300">
            </div>
        </div>

        <!-- Line 登入按鈕 -->
        <a href="#" class="login-btn line-btn" onclick="lineLogin()">
            使用 LINE 登入
        </a>

        <div id="result"></div>
    </div>

    <script>
        // 處理 Google 登入成功後的回傳
        function handleGoogleCredentialResponse(response) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            // response.credential 是一段 JWT Token
            resultDiv.innerHTML = `<strong>Google 登入成功！</strong><br><br>
                               <span style="color: green;">取得的 ID Token:</span><br>
                               <textarea style="width: 100%; height: 100px; margin-top: 10px; font-size: 12px; resize: none;" readonly>${response.credential}</textarea><br>
                               <small style="color: #666;">（此 Token 可傳遞給後端進行驗證並解析出 Email/姓名）</small>`;

            console.log("Encoded JWT ID token: " + response.credential);
        }

        // 處理 Line 登入導向
        function lineLogin() {
            // 替換為你的 Line Channel ID
            const clientId = '2009487514';
            // 替換為你的回傳網址 (既然你目前用 port 8000 測試，我們就先導到 8000，讓你看看回傳什麼)
            const redirectUri = encodeURIComponent('http://localhost:8000/auth/line/callback');
            const state = 'random_state_string_123';
            const scope = 'profile openid email';



            // 組合 LINE Login 授權網址
            const lineAuthUrl = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&state=${state}&scope=${scope}`;

            // 導向 LINE 登入頁面
            window.location.href = lineAuthUrl;
        }
    </script>

</body>

</html>
